server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: "*"
                allowed-methods: "*"
                allowed-headers: "*"
                exposed-headers: "*"
                allow-credentials: false
                max-age: 3600

          routes:
            - id: boleta-service
              uri: lb://boletas  
              predicates:
                - Path=/api/v1/boletas/**, /boletas/api-docs/**

            - id: cliente-service
              uri: lb://clientes 
              predicates:
                - Path=/api/v1/clientes/**, /clientes/api-docs/**

            - id: producto-service
              uri: lb://productos 
              predicates:
                - Path=/api/v1/productos/**, /productos/api-docs/**

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: Microservicio Boletas
        url: /boletas/api-docs
      - name: Microservicio Productos
        url: /productos/api-docs
      - name: Microservicio Clientes
        url: /clientes/api-docs
    disable-swagger-default-url: true
    display-request-duration: true
  api-docs:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: false